<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e; color: #eee; height: 100vh; display: flex;
        }
        .sidebar {
            width: 300px; background: #16213e; padding: 20px;
            display: flex; flex-direction: column; border-right: 1px solid #0f3460;
        }
        .sidebar h2 { color: #e94560; margin-bottom: 15px; font-size: 18px; }
        .upload-area {
            border: 2px dashed #0f3460; border-radius: 10px; padding: 20px;
            text-align: center; cursor: pointer; transition: all 0.3s; margin-bottom: 15px;
        }
        .upload-area:hover { border-color: #e94560; background: rgba(233,69,96,0.1); }
        .upload-area input { display: none; }
        .upload-area p { color: #888; font-size: 14px; }
        .btn {
            color: white; border: none; padding: 10px 20px;
            border-radius: 8px; cursor: pointer; width: 100%; font-size: 14px;
            margin-top: 8px; transition: background 0.3s;
        }
        .btn-red { background: #e94560; }
        .btn-red:hover { background: #c73652; }
        .btn-dark { background: #0f3460; }
        .btn-dark:hover { background: #1a4a8a; }
        .btn-danger { background: #c0392b; font-size: 12px; padding: 5px 10px; width: auto; margin: 0; }
        .btn-danger:hover { background: #e74c3c; }
        .btn:disabled { background: #555; cursor: not-allowed; }
        .doc-list { flex: 1; overflow-y: auto; margin-top: 10px; }
        .doc-item {
            background: #1a1a2e; padding: 10px; border-radius: 8px;
            margin-bottom: 8px; font-size: 13px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .doc-item .doc-info { flex: 1; }
        .doc-item .name { color: #e94560; font-weight: bold; }
        .doc-item .info { color: #888; font-size: 12px; }
        .status {
            padding: 8px; border-radius: 8px; font-size: 13px;
            margin-top: 10px; display: none;
        }
        .status.success { display: block; background: rgba(46,213,115,0.2); color: #2ed573; }
        .status.error { display: block; background: rgba(233,69,96,0.2); color: #e94560; }
        .status.loading { display: block; background: rgba(52,152,219,0.2); color: #3498db; }
        .main { flex: 1; display: flex; flex-direction: column; }
        .header {
            padding: 15px 25px; background: #16213e; border-bottom: 1px solid #0f3460;
            display: flex; align-items: center; justify-content: space-between;
        }
        .header h1 { font-size: 20px; color: #e94560; }
        .header-right { display: flex; align-items: center; gap: 15px; }
        .header .model-info { color: #888; font-size: 13px; }
        .new-chat-btn {
            background: #0f3460; color: #eee; border: none; padding: 8px 16px;
            border-radius: 8px; cursor: pointer; font-size: 13px;
        }
        .new-chat-btn:hover { background: #1a4a8a; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; }
        .message { max-width: 80%; margin-bottom: 20px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user { margin-left: auto; }
        .message.assistant { margin-right: auto; }
        .message .bubble {
            padding: 12px 16px; border-radius: 12px; font-size: 15px; line-height: 1.6;
        }
        .message.user .bubble {
            background: #e94560; color: white; border-bottom-right-radius: 4px;
        }
        .message.assistant .bubble {
            background: #16213e; border: 1px solid #0f3460; border-bottom-left-radius: 4px;
        }
        .message .sources { margin-top: 8px; font-size: 12px; color: #888; }
        .message .sources span {
            background: #0f3460; padding: 2px 8px; border-radius: 4px; margin-right: 5px;
        }
        .typing { color: #888; font-style: italic; padding: 10px 20px; display: none; }
        .typing.show { display: block; }
        .input-area {
            padding: 15px 20px; background: #16213e; border-top: 1px solid #0f3460;
            display: flex; gap: 10px;
        }
        .input-area input {
            flex: 1; padding: 12px 16px; background: #1a1a2e; border: 1px solid #0f3460;
            border-radius: 10px; color: #eee; font-size: 15px; outline: none;
        }
        .input-area input:focus { border-color: #e94560; }
        .input-area button {
            background: #e94560; color: white; border: none; padding: 12px 24px;
            border-radius: 10px; cursor: pointer; font-size: 15px; transition: background 0.3s;
        }
        .input-area button:hover { background: #c73652; }
        .input-area button:disabled { background: #555; cursor: not-allowed; }
        .welcome { text-align: center; margin-top: 100px; color: #555; }
        .welcome h2 { font-size: 24px; color: #e94560; margin-bottom: 10px; }
        .welcome p { font-size: 16px; margin-bottom: 5px; }
        .memory-badge {
            background: #2ed573; color: #1a1a2e; padding: 2px 8px;
            border-radius: 4px; font-size: 11px; font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>📄 Документы</h2>
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <p>📁 Нажмите чтобы выбрать файл</p>
            <p style="font-size: 12px; margin-top: 5px;">.txt .pdf .md</p>
            <input type="file" id="fileInput" accept=".txt,.pdf,.md" onchange="handleFile(this)">
        </div>
        <div id="selectedFile" style="color: #888; font-size: 13px; margin-bottom: 5px;"></div>
        <button class="btn btn-red" id="uploadBtn" onclick="uploadFile()" disabled>Загрузить</button>
        <button class="btn btn-dark" onclick="deleteAll()" style="margin-top: 5px;">🗑️ Удалить все документы</button>
        <div id="uploadStatus" class="status"></div>
        <h2 style="margin-top: 20px;">📚 Загруженные</h2>
        <div class="doc-list" id="docList">
            <p style="color: #555; font-size: 13px;">Пока ничего...</p>
        </div>
    </div>

    <div class="main">
        <div class="header">
            <h1>🤖 RAG Assistant</h1>
            <div class="header-right">
                <span class="memory-badge">ПАМЯТЬ ВКЛ</span>
                <button class="new-chat-btn" onclick="newChat()">🔄 Новый чат</button>
                <span class="model-info" id="modelInfo">Загрузка...</span>
            </div>
        </div>
        <div class="messages" id="messages">
            <div class="welcome">
                <h2>Привет! 👋</h2>
                <p>Я — RAG Assistant с памятью</p>
                <p>Загрузите документы слева и задавайте вопросы</p>
                <p style="margin-top: 10px; font-size: 14px; color: #e94560;">
                    Я помню наш разговор! Можете ссылаться на предыдущие вопросы.
                </p>
            </div>
        </div>
        <div class="typing" id="typing">🤔 Думаю...</div>
        <div class="input-area">
            <input type="text" id="questionInput" placeholder="Задайте вопрос по документам..."
                   onkeypress="if(event.key==='Enter') askQuestion()">
            <button onclick="askQuestion()" id="askBtn">Отправить</button>
        </div>
    </div>

    <script>
        const API = '';
        let selectedFile = null;

        // Генерируем уникальный ID для разговора
        let conversationId = 'conv_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);

        window.onload = async function() {
            await loadHealth();
            await loadDocuments();
        };

        // Новый чат — сбрасываем память
        function newChat() {
            conversationId = 'conv_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            document.getElementById('messages').innerHTML = `
                <div class="welcome">
                    <h2>Новый чат! 🔄</h2>
                    <p>Память очищена. Задавайте вопросы.</p>
                </div>`;
        }

        async function loadHealth() {
            try {
                const resp = await fetch(`${API}/health`);
                const data = await resp.json();
                document.getElementById('modelInfo').textContent =
                    `${data.embeddings || ''}`;
            } catch(e) {
                document.getElementById('modelInfo').textContent = 'Ошибка';
            }
        }

        async function loadDocuments() {
            try {
                const resp = await fetch(`${API}/documents`);
                const data = await resp.json();
                const list = document.getElementById('docList');
                if (data.documents && data.documents.length > 0) {
                    list.innerHTML = data.documents.map(doc => `
                        <div class="doc-item">
                            <div class="doc-info">
                                <div class="name">📄 ${doc.filename}</div>
                                <div class="info">${doc.chunks} фрагментов</div>
                            </div>
                            <button class="btn btn-danger" onclick="deleteDoc('${doc.filename}')">🗑️</button>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = '<p style="color: #555; font-size: 13px;">Пока ничего...</p>';
                }
            } catch(e) { console.error(e); }
        }

        function handleFile(input) {
            if (input.files.length > 0) {
                selectedFile = input.files[0];
                document.getElementById('selectedFile').textContent = `Выбран: ${selectedFile.name}`;
                document.getElementById('uploadBtn').disabled = false;
            }
        }

        async function uploadFile() {
            if (!selectedFile) return;
            const btn = document.getElementById('uploadBtn');
            const status = document.getElementById('uploadStatus');
            btn.disabled = true;
            btn.textContent = 'Загрузка...';
            status.className = 'status loading';
            status.textContent = '⏳ Обрабатываю документ...';
            try {
                const formData = new FormData();
                formData.append('file', selectedFile);
                const resp = await fetch(`${API}/upload`, { method: 'POST', body: formData });
                const data = await resp.json();
                if (data.status === 'ok') {
                    status.className = 'status success';
                    status.textContent = `✅ ${data.message}`;
                    await loadDocuments();
                } else {
                    status.className = 'status error';
                    status.textContent = `❌ ${data.detail}`;
                }
            } catch(e) {
                status.className = 'status error';
                status.textContent = `❌ ${e.message}`;
            }
            btn.disabled = false;
            btn.textContent = 'Загрузить';
            selectedFile = null;
            document.getElementById('selectedFile').textContent = '';
            document.getElementById('fileInput').value = '';
        }

        async function deleteDoc(filename) {
            if (!confirm(`Удалить "${filename}"?`)) return;
            try {
                const resp = await fetch(`${API}/documents/${encodeURIComponent(filename)}`, { method: 'DELETE' });
                const data = await resp.json();
                if (data.status === 'ok') {
                    await loadDocuments();
                    const status = document.getElementById('uploadStatus');
                    status.className = 'status success';
                    status.textContent = `✅ ${data.message}`;
                }
            } catch(e) { alert('Ошибка: ' + e.message); }
        }

        async function deleteAll() {
            if (!confirm('Удалить ВСЕ документы?')) return;
            try {
                const resp = await fetch(`${API}/documents`, { method: 'DELETE' });
                const data = await resp.json();
                if (data.status === 'ok') {
                    await loadDocuments();
                    const status = document.getElementById('uploadStatus');
                    status.className = 'status success';
                    status.textContent = `✅ ${data.message}`;
                }
            } catch(e) { alert('Ошибка: ' + e.message); }
        }

        async function askQuestion() {
            const input = document.getElementById('questionInput');
            const question = input.value.trim();
            if (!question) return;
            addMessage(question, 'user');
            input.value = '';
            const typing = document.getElementById('typing');
            typing.classList.add('show');
            document.getElementById('askBtn').disabled = true;
            try {
                const formData = new FormData();
                formData.append('question', question);
                formData.append('conversation_id', conversationId);
                const resp = await fetch(`${API}/ask`, { method: 'POST', body: formData });
                const data = await resp.json();
                addMessage(data.answer, 'assistant', data.sources);
            } catch(e) {
                addMessage(`Ошибка: ${e.message}`, 'assistant');
            }
            typing.classList.remove('show');
            document.getElementById('askBtn').disabled = false;
        }

        function addMessage(text, role, sources = null) {
            const messages = document.getElementById('messages');
            const welcome = messages.querySelector('.welcome');
            if (welcome) welcome.remove();
            const div = document.createElement('div');
            div.className = `message ${role}`;
            let html = `<div class="bubble">${formatText(text)}</div>`;
            if (sources && sources.length > 0) {
                html += '<div class="sources">Источники: ';
                html += sources.map(s =>
                    `<span>📄 ${s.file} (${(s.score * 100).toFixed(0)}%)</span>`
                ).join(' ');
                html += '</div>';
            }
            div.innerHTML = html;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function formatText(text) {
            return text
                .replace(/\n/g, '<br>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/`(.*?)`/g, '<code style="background:#0f3460;padding:2px 6px;border-radius:4px">$1</code>');
        }
    </script>
</body>
</html>
